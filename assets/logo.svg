<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Gold Gym Proddatur logo">
  <defs>
    <path id="arcTop" d="M 28 100 A 72 72 0 0 1 172 100" fill="none"/>
    <path id="arcBot" d="M 168 100 A 68 68 0 0 1 32 100" fill="none"/>
  </defs>
  <!-- black outer ring -->
  <circle cx="100" cy="100" r="96" fill="#111"/>
  <!-- yellow band -->
  <circle cx="100" cy="100" r="90" fill="#f5b50a"/>
  <!-- white inner circle -->
  <circle cx="100" cy="100" r="60" fill="#fff"/>
  <!-- brand text GOLD / GYM -->
  <text font-family="Arial Black, Impact, sans-serif" font-weight="900" font-style="italic" font-size="30" fill="#111" letter-spacing="1">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">GOLD</textPath>
  </text>
  <text font-family="Arial Black, Impact, sans-serif" font-weight="900" font-style="italic" font-size="30" fill="#111" letter-spacing="2">
    <textPath href="#arcBot" startOffset="50%" text-anchor="middle">GYM</textPath>
  </text>
  <!-- downward triangle -->
  <polygon points="100,58 158,168 42,168" fill="#111"/>
  <!-- bodybuilder silhouette: front double biceps (original stylized path) -->
  <g fill="#fff">
    <circle cx="100" cy="78" r="9"/>
    <!-- shoulders + raised arms + torso -->
    <path d="M100 87
             c -11 0 -19 6 -22 15
             l -10 30 11 4 9 -25
             c 1 9 4 22 5 34 l -6 28 11 4 7 -30
             c 2 12 6 24 11 30 l 7 -7
             c -6 -7 -9 -20 -10 -32 l 8 30 11 -4
             -6 -28 c 1 -12 4 -25 5 -34 l 9 25 11 -4 -10 -30
             c -3 -9 -11 -15 -22 -15 Z"/>
  </g>
</svg>
